<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="Calctide" content="width=device-width, initial-scale=1">
        <title>Calctide</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>

            <div class="Topbar">
                <img src="https://res.cloudinary.com/dkjsbd1db/image/upload/flask3_tz3ra0.png" alt="">
                <p class="title">Calctide</p>
            </div>
            <div class="main">
                <div class="buttons">
                    <div class="stack">
                        <p>Select Syringe Volume</p>
                        <div class="row">
                            <button id="Sv03" type="button" class="btn">0.3 ml</button>
                            <img src="https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_30_kj7f3e.png" alt="">
                        </div>
                        <div class="row">
                            <button id="Sv05" type="button" class="btn">0.5 ml</button>
                            <img src="https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_50_rl6hhy.png" alt="">
                        </div>
                        <div class="row">
                            <button id="Sv10" type="button" class="btn">1.0 ml</button>
                            <img src="https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_100_va7fof.png" alt="">
                        </div>
                    </div>
                    <div class="b234">
                        <div class="stack">
                            <div class="parentrow">
                                <div class="vialrow">
                                    <img src="https://res.cloudinary.com/dkjsbd1db/image/upload/med-flask_g60lul.png" alt="">
                                    <div class="stack">
                                        <p id="MP">Amount of peptide in vial</p>
                                        <div class="row">
                                                <button id="M5" type="button" class="btn">5 mg</button>
                                                <button id="M10" type="button" class="btn">10 mg</button>
                                                <button id="M15" type="button" class="btn">15 mg</button>
                                                <button id="MOther" type="button" class="btn">other</button>
                                        </div>
                                        <input type="number" class="input" id="MOtherInput" step="any">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="stack">
                            <div class="parentrow">
                                <div class="vialrow">
                                    <img src="https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304828/bac-water_gggegs.png" alt="">
                                    <div class="stack">
                                        <p>Amount of bacteriostatic water</p>
                                        <div class="row">
                                            <button id="V1" type="button" class="btn">1 ml</button>
                                            <button id="V2" type="button" class="btn">2 ml</button>
                                            <button id="V3" type="button" class="btn">3 ml</button>
                                            <button id="VOther" type="button" class="btn">other</button>
                                        </div>
                                        <input type="number" class="input" id="VOtherInput" step="any">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="stack">
                            <p>Mcg dosage desired</p>
                            <div class="row">
                                        <button id="D100" type="button" class="btn">100 mcg</button>
                                        <button id="D500" type="button" class="btn">500 mcg</button>
                                        <button id="D1000" type="button" class="btn">1000 mcg</button>
                                        <button id="DOther" type="button" class="btn">other</button>
                                    </div>
                                    <input type="number" class="input" id="DOtherInput" step="any">
                        </div>
                    </div>

                </div>
                <div class="stackfire">
                    <b id="message"> </b>
                <div class="freebox">
                    <img id="blue" src="https://res.cloudinary.com/dkjsbd1db/image/upload/v1776311652/blue_rdvirf.png" alt="">
                    <img id="rulerImg" src="https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_30_kj7f3e.png" alt="ruler">
                </div>
                </div>

            </div>





            <script>
                const selection = {
                    Sv: "0.3",
                    M: "5",
                    V: "1",
                    D: "100",
                };

                const values = {
                    Sv:0.3,
                    M:5,
                    V:1,
                    D:100,
                }

                const groups = {
                    Sv: {
                    "0.3": document.getElementById("Sv03"),
                    "0.5": document.getElementById("Sv05"),
                    "1.0": document.getElementById("Sv10"),
                    },
                    M: {
                    "5":     document.getElementById("M5"),
                    "10":    document.getElementById("M10"),
                    "15":    document.getElementById("M15"),
                    "other": document.getElementById("MOther"),
                    },
                    V: {
                    "1":     document.getElementById("V1"),
                    "2":     document.getElementById("V2"),
                    "3":     document.getElementById("V3"),
                    "other": document.getElementById("VOther"),
                    },
                    D: {
                    "100":   document.getElementById("D100"),
                    "500":   document.getElementById("D500"),
                    "1000":  document.getElementById("D1000"),
                    "other": document.getElementById("DOther"),
                    },
                };
                const otherInputs = {
                    M: document.getElementById("MOtherInput"),
                    V: document.getElementById("VOtherInput"),
                    D: document.getElementById("DOtherInput"),
                }

                const rulerImages = {
                    "0.3": "https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_30_kj7f3e.png",
                    "0.5": "https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_50_rl6hhy.png",
                    "1.0": "https://res.cloudinary.com/dkjsbd1db/image/upload/v1776304801/ruler_100_va7fof.png",
                };

                const messageEl = document.getElementById("message");
                const rulerImg  = document.getElementById("rulerImg");

function render() {
  // inline computation
  const units = (values.D / (values.M * 1000 / values.V)) * 100;

  messageEl.innerHTML =
    units > 0 && units < values.Sv * 100 + 1
      ? `For a dosage of <b style="color: #3b82f6;">${values.D.toFixed(2)}</b> mcg, fill the syringe up to <b style="color: #3b82f6;">${units.toFixed(2)}</b>`
      : "Insufficient volume in syringe";

  for (const [groupKey, buttons] of Object.entries(groups)) {
    for (const [value, el] of Object.entries(buttons)) {
      el.dataset.active = selection[groupKey] === value;
    }
  }
  for (const [groupKey, input] of Object.entries(otherInputs)) {
    input.dataset.active = selection[groupKey] === "other";
  }

  rulerImg.src = rulerImages[selection.Sv];
}

for (const [groupKey, buttons] of Object.entries(groups)) {
  for (const [value, el] of Object.entries(buttons)) {
    el.addEventListener("click", () => {
      const wasOther = selection[groupKey] === "other";
      selection[groupKey] = value;
      if (value !== "other") {
        values[groupKey] = parseFloat(value);
      } else if (!wasOther) {
        otherInputs[groupKey].value = values[groupKey];
      }
      render();
    });
  }
}

for (const [groupKey, input] of Object.entries(otherInputs)) {
  input.addEventListener("input", () => {
    const n = parseFloat(input.value);
    if (!isNaN(n)) {
      values[groupKey] = n;
      render();
    }
  });
}

render();
            </script>
    </body>


</html>
